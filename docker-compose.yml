services:
  backend:
    build: ./backend
    container_name: motus-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - motus-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: motus-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  motus-data:
